<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>classlib — Knowledge Canvas</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<!-- Marked -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

  @keyframes cl-toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cl-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cl-slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .cl-fade { animation: cl-fade-up .28s cubic-bezier(.22,.7,.3,1) both; }
  .cl-slidein { animation: cl-slide-in .22s cubic-bezier(.22,.7,.3,1) both; }

  /* Prose styles for rendered Markdown + KaTeX */
  .cl-prose { color: var(--cl-ink); }
  .cl-prose > *:first-child { margin-top: 0; }
  .cl-prose h1 { font-size: 1.6em; font-weight: 600; margin: 1.4em 0 .5em; letter-spacing: -0.3px; }
  .cl-prose h2 { font-size: 1.25em; font-weight: 600; margin: 1.6em 0 .5em; letter-spacing: -0.2px;
    padding-bottom: .25em; border-bottom: 1px solid var(--cl-line-soft); }
  .cl-prose h3 { font-size: 1.05em; font-weight: 600; margin: 1.3em 0 .4em; }
  .cl-prose p { margin: .9em 0; }
  .cl-prose strong { font-weight: 600; color: var(--cl-ink); }
  .cl-prose em { font-style: italic; }
  .cl-prose a { color: var(--cl-accent); text-decoration: none; border-bottom: 1px solid color-mix(in oklab, var(--cl-accent) 40%, transparent); }
  .cl-prose ul, .cl-prose ol { padding-left: 1.5em; margin: .8em 0; }
  .cl-prose li { margin: .25em 0; }
  .cl-prose code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: .88em;
    background: var(--cl-chip); padding: 1px 5px; border-radius: 4px; color: var(--cl-ink); }
  .cl-prose pre { background: var(--cl-surface); border: 1px solid var(--cl-line); border-radius: var(--cl-radius);
    padding: 14px 16px; overflow-x: auto; margin: 1em 0; font-size: .85em; line-height: 1.55; }
  .cl-prose pre code { background: transparent; padding: 0; font-size: 1em; }
  .cl-prose blockquote { border-left: 3px solid var(--cl-accent); padding: .2em 0 .2em 1em;
    margin: 1em 0; color: var(--cl-ink-soft); font-style: italic; }
  .cl-prose table { border-collapse: collapse; margin: 1em 0; font-size: .92em; width: 100%; }
  .cl-prose th, .cl-prose td { padding: 8px 14px; border-bottom: 1px solid var(--cl-line-soft); text-align: left; }
  .cl-prose th { font-weight: 600; background: var(--cl-line-soft); border-bottom: 1px solid var(--cl-line); }
  .cl-prose tr:last-child td { border-bottom: none; }
  .cl-prose hr { border: none; border-top: 1px solid var(--cl-line); margin: 2em 0; }
  .cl-prose .katex { font-size: 1.05em; }
  .cl-prose .katex-display { margin: 1.1em 0; padding: .4em 0; overflow-x: auto; overflow-y: hidden; }

  /* Scrollbars: thin and quiet */
  .cl-root *::-webkit-scrollbar { width: 8px; height: 8px; }
  .cl-root *::-webkit-scrollbar-thumb { background: var(--cl-line); border-radius: 4px; }
  .cl-root *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Core (plain JS) -->
<script src="data.js"></script>
<script src="render.js"></script>

<!-- App (JSX via Babel) -->
<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="views-home.jsx"></script>
<script type="text/babel" src="views-reader.jsx"></script>
<script type="text/babel" src="views-editor.jsx"></script>
<script type="text/babel" src="views-pr.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<!-- Mount: single full-screen editorial-serif instance -->
<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(
    <ToastHost>
      <KnowledgeCanvas direction="editorial" initialView="home" />
    </ToastHost>
  );
</script>
</body>
</html>
